<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Predict AI</title>
<style>
body{margin:0;background:#0b0b0f;color:#fff;font-family:system-ui;overflow:hidden}
#ui{position:fixed;top:10px;left:10px;display:flex;gap:6px;z-index:10}
button{background:#16161d;border:1px solid #2a2a35;color:#fff;padding:6px 10px;border-radius:8px;font-size:12px;cursor:pointer;transition:.2s}
button:hover{background:#2a2a35}
#panel{position:fixed;right:0;top:0;width:280px;height:100%;background:#111;border-left:1px solid #222;padding:12px;overflow:auto;transform:translateX(100%);transition:.4s}
#panel.open{transform:translateX(0)}
#canvas{position:absolute;inset:0;transition:transform .6s}
.circle{position:absolute;border-radius:50%;border:1px solid #222;display:flex;justify-content:center;align-items:center}
.option{position:absolute;background:#181820;border:1px solid #333;border-radius:8px;padding:4px 6px;font-size:11px;cursor:pointer;white-space:nowrap;transition:.2s}
.option:hover{background:#2c2c38;transform:scale(1.1)}
.centerDot{width:8px;height:8px;background:#fff;border-radius:50%}
</style>
</head>
<body>

<div id="ui">
<button onclick="resetAll()">Reset</button>
<button onclick="exportData()">Export</button>
<button onclick="importData()">Import</button>
<button onclick="openNew()">Nuova</button>
<button onclick="togglePanel()">Risultato</button>
</div>

<div id="panel"></div>
<div id="canvas"></div>

<script>
let state=[]
let circles=[]
let offsetX=0
const canvas=document.getElementById("canvas")

function createCircle(options,level){
const size=140+level*120
const c=document.createElement("div")
c.className="circle"
c.style.width=size+"px"
c.style.height=size+"px"
c.style.left=(window.innerWidth/2-size/2+offsetX)+"px"
c.style.top=(window.innerHeight/2-size/2)+"px"

let angleOffset=0
let isDragging=false

c.onmousedown=e=>{
isDragging=true
}

window.onmouseup=()=>isDragging=false

window.onmousemove=e=>{
if(!isDragging)return
angleOffset+=e.movementX*0.01
render()
}

function render(){
c.innerHTML='<div class="centerDot"></div>'
options.forEach((opt,i)=>{
const angle=(i/options.length)*Math.PI*2+angleOffset
const btn=document.createElement("div")
btn.className="option"
btn.innerText=opt
btn.style.left=(size/2+Math.cos(angle)*(size/2-30))+"px"
btn.style.top=(size/2+Math.sin(angle)*(size/2-30))+"px"

btn.onclick=()=>selectOption(opt)
c.appendChild(btn)
})
}

render()
canvas.appendChild(c)
circles.push(c)
offsetX+=120
canvas.style.transform=`translateX(-${offsetX/2}px)`
}

async function selectOption(opt){
state.push(opt)
const res=await fetch("/api/predict",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({history:state})})
const data=await res.json()
createCircle(data.options,state.length)
}

function resetAll(){
state=[]
circles.forEach(c=>c.remove())
circles=[]
offsetX=0
canvas.style.transform="translateX(0)"
createCircle(["Inizio","Esplora","Impara","Decisione","Simulazione"],0)
}

function exportData(){
navigator.clipboard.writeText(JSON.stringify(state))
}

function importData(){
const d=prompt("Incolla")
if(!d)return
resetAll()
state=JSON.parse(d)
state.forEach((s,i)=>createCircle([s],i))
}

function openNew(){
window.open(location.href,"_blank")
}

function togglePanel(){
const p=document.getElementById("panel")
p.classList.toggle("open")
p.innerText=state.join("\n→ ")
}

resetAll()
</script>

</body>
</html>
